name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag, for example v0.1.1"
        required: true
        type: string
      build_runtime:
        description: "Build runtime zip"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      require_runtime_asset:
        description: "Fail release if runtime zip cannot be built"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        shell: pwsh
        run: python -m pip install -r requirements.txt

      - name: Run tests
        shell: pwsh
        run: |
          python -m unittest discover -s tests -v
          python -m compileall realtime_audio_translator tests

      - name: Download Faster-Whisper-XXL runtime
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_runtime == 'true' }}
        continue-on-error: ${{ github.event_name == 'workflow_dispatch' && inputs.require_runtime_asset == 'false' }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $releases = Invoke-RestMethod "https://api.github.com/repos/Purfview/whisper-standalone-win/releases?per_page=20"
          $assets = $releases | ForEach-Object { $_.assets }
          $runtimeAsset = $assets |
            Where-Object { $_.name -match "Faster-Whisper-XXL_.*_windows\.(7z|zip)$" } |
            Sort-Object updated_at -Descending |
            Select-Object -First 1
          $cudaAsset = $assets |
            Where-Object { $_.name -eq "cuBLAS.and.cuDNN_CUDA12_win_v3.7z" } |
            Select-Object -First 1
          if (-not $runtimeAsset) {
            throw "Cannot find Faster-Whisper-XXL Windows asset. Upload runtime zip manually or update release workflow matcher."
          }
          if (-not $cudaAsset) {
            throw "Cannot find cuBLAS.and.cuDNN_CUDA12_win_v3.7z. Upload runtime zip manually or update release workflow matcher."
          }

          New-Item -ItemType Directory -Path runtime-download, cuda-download, downloaded-runtime | Out-Null
          Invoke-WebRequest $runtimeAsset.browser_download_url -OutFile runtime-download\runtime.pkg
          Invoke-WebRequest $cudaAsset.browser_download_url -OutFile cuda-download\cuda.7z

          $sevenZip = "${env:ProgramFiles}\7-Zip\7z.exe"
          if (-not (Test-Path $sevenZip)) {
            throw "7-Zip not found on runner."
          }
          & $sevenZip x runtime-download\runtime.pkg "-oruntime-download\extracted" -y
          & $sevenZip x cuda-download\cuda.7z "-ocuda-download\extracted" -y

          $fw = Get-ChildItem runtime-download\extracted -Recurse -Filter faster-whisper-xxl.exe | Select-Object -First 1
          if (-not $fw) {
            throw "Downloaded runtime does not contain faster-whisper-xxl.exe."
          }
          Copy-Item -Path (Join-Path $fw.Directory.FullName "*") -Destination downloaded-runtime -Recurse -Force
          Get-ChildItem cuda-download\extracted -Recurse -Filter *.dll | Copy-Item -Destination downloaded-runtime -Force

      - name: Build release zips
        shell: pwsh
        run: |
          $version = "${{ inputs.version }}"
          if ([string]::IsNullOrWhiteSpace($version)) {
            $version = "${{ github.ref_name }}"
          }
          if ($version -notlike "v*") {
            throw "Release version must start with v, for example v0.1.1."
          }
          $args = @("-Version", $version)
          if (Test-Path "downloaded-runtime\faster-whisper-xxl.exe") {
            $args += @("-RuntimeSource", "downloaded-runtime")
          }
          & ./scripts/package.ps1 @args

      - name: Upload GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version || github.ref_name }}
          body_path: docs/RELEASE_NOTES.md
          files: |
            release-output/*.zip
            release-output/SHA256SUMS.txt
